name: 🎬 OTT Billing Platform - CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build All Microservices on Java 17
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Cache Maven dependencies
      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # Step 4: Build ALL microservices (multi-module Maven build)
      - name: 🏗️ Build All Microservices
        run: mvn clean install -DskipTests --no-transfer-progress

      # Step 5: Run tests across all modules
      - name: 🧪 Run Tests Across All Microservices
        run: mvn test --no-transfer-progress

      # Step 6: Verify Discovery Client builds
      - name: 🔍 Verify Discovery Service (Eureka)
        run: mvn verify -pl Discovery-client -DskipTests --no-transfer-progress

      # Step 7: Verify API Gateway builds
      - name: 🔀 Verify API Gateway
        run: mvn verify -pl API-Gateway-OTT -DskipTests --no-transfer-progress

      # Step 8: Verify Billing System builds
      - name: 💰 Verify Billing System
        run: mvn verify -pl Billing-System -DskipTests --no-transfer-progress

      # Step 9: Verify Invoice Generation builds
      - name: 🧾 Verify Invoice Generation
        run: mvn verify -pl Invoice-Generation -DskipTests --no-transfer-progress

      # Step 10: Upload build artifacts
      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: microservices-jars
          path: |
            API-Gateway-OTT/target/*.jar
            Billing-System/target/*.jar
            Invoice-Generation/target/*.jar
            Discovery-client/target/*.jar
